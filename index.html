<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdullah Imran | Software Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#03140f,#0b2d23);
color:white;
}

/* NAVBAR */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
position:sticky;
top:0;
background:#081f18;
border-bottom:2px solid #ff7a00;
backdrop-filter:blur(8px);
}

nav a{
margin-left:25px;
text-decoration:none;
color:#d1fae5;
font-weight:500;
transition:0.3s;
}

nav a:hover{
color:#ff7a00
}

/* HERO */

.hero{
min-height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.hero h1{
font-size:60px;
margin-bottom:15px;
background:linear-gradient(90deg,#10b981,#34d399);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
font-size:20px;
max-width:700px;
color:#cbd5e1;
}

.buttons{
margin-top:30px;
}

.button{
padding:12px 26px;
margin-top:15px;
border:none;
border-radius:8px;
background:#ff7a00;
color:white;
cursor:pointer;
font-size:14px;
font-weight:600;
transition:0.3s;
}

.button:hover{
background:#ff9a33;
}

/* SECTIONS */

.section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

.section h2{
font-size:36px;
margin-bottom:20px;
border-left:4px solid #ff7a00;
padding-left:10px;
}

/* SKILLS */

.skills{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.skillBox{
background:#0f3a2d;
padding:20px;
border-radius:10px;
}

/* PROJECTS */

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
margin-top:30px;
}

.card{
background:#0f3a2d;
padding:25px;
border-radius:12px;
transition:0.3s;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card p{
color:#cbd5e1
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
background:#081f18;
margin-top:40px;
color:#94a3b8;
}

/* FADE ANIMATION */

.fade{
opacity:0;
transform:translateY(20px);
transition:all 0.8s ease;
}

.fade.visible{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useEffect}=React

function Navbar(){
return(
<header>
<h2>&lt; Abdullah Imran /&gt;</h2>
<nav>
<a href="#about">About</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>
</header>
)
}

function Hero(){
return(
<section className="hero">
<h1>Software & Web Developer</h1>

<p>
Information Technology student at George Mason University passionate about building software, developing backend systems, and exploring modern technologies.
</p>

<div className="buttons">
<a href="#projects">
<button className="button">View Projects</button>
</a>
</div>

</section>
)
}

function About(){
return(
<section id="about" className="section fade">

<h2>About Me</h2>

<p>
I am an Information Technology student at <b>George Mason University</b> with a strong interest in software development and modern technology.
</p>

<p>
One of my favorite languages to work with is <b>Python</b>. I enjoy using Python to build practical applications, backend logic, and automation tools that solve real-world problems.
</p>

<p>
Beyond coursework, I enjoy learning about new technologies, experimenting with development frameworks, and improving my programming skills through projects. I am particularly interested in backend systems, scalable APIs, and modern web applications.
</p>

</section>
)
}

function Skills(){
return(
<section id="skills" className="section fade">

<h2>Technical Skills</h2>

<div className="skills">

<div className="skillBox">
<h3>Programming</h3>
<p>Python<br/>JavaScript<br/>SQL</p>
</div>

<div className="skillBox">
<h3>Web Development</h3>
<p>React<br/>Node.js<br/>HTML<br/>CSS<br/>REST APIs</p>
</div>

<div className="skillBox">
<h3>Infrastructure</h3>
<p>AWS Fundamentals<br/>Linux<br/>Windows Server<br/>Active Directory<br/>DNS</p>
</div>

<div className="skillBox">
<h3>Tools</h3>
<p>Git<br/>GitHub<br/>MySQL<br/>Virtualization</p>
</div>

</div>

</section>
)
}

function Project({title,desc,link,download}){
return(
<div className="card">

<div>
<h3>{title}</h3>
<p>{desc}</p>
</div>

{link && (
<a href={link} target="_blank">
<button className="button">Learn More</button>
</a>
)}

{download && (
<a href={download} download>
<button className="button">Download Files</button>
</a>
)}

</div>
)
}

function Projects(){
return(
<section id="projects" className="section fade">

<h2>Projects</h2>

<div className="projects">

<Project
title="Learnorama"
desc="Educational learning platform project that helps users explore topics through structured knowledge and interactive content."
link="https://abdullahdevi.github.io/Learnorama-Website/"/>

<Project
title="REST API System"
desc="Node.js and MySQL REST API supporting CRUD operations with structured routing, input validation, and secure SQL queries."/>

<Project
title="Instant Cart Python Application"
desc="Object oriented Python shopping cart system implementing coupon logic, tax calculations, and receipt generation."
link="https://github.com/abdullahdevi/instant-cart-python"/>

<Project
title="Web Server Deployment"
desc="Configured Windows Server infrastructure with Active Directory, DNS, Apache, IIS, and MySQL integration in a virtual environment."
download="web-server-project.zip"/>

<Project
title="Portfolio Website"
desc="Personal developer portfolio built using React showcasing projects, skills, and technical experience."/>

</div>

</section>
)
}

function Contact(){
return(
<section id="contact" className="section fade">

<h2>Contact</h2>

<p>Email: aimran8@gmu.edu</p>
<p>LinkedIn: linkedin.com/in/abdullah-imran-dev</p>
<p>GitHub: github.com/abdullahdevi</p>

</section>
)
}

function Footer(){
return(
<footer>
<p>© 2026 Abdullah Imran</p>
</footer>
)
}

function App(){

useEffect(()=>{

const faders=document.querySelectorAll('.fade')

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('visible')
}
})
})

faders.forEach(el=>observer.observe(el))

},[])

return(
<>
<Navbar/>
<Hero/>
<About/>
<Skills/>
<Projects/>
<Contact/>
<Footer/>
</>
)
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)

</script>

</body>
</html>
